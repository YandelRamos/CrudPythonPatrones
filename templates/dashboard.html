<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <h1 class="mb-4">Dashboard</h1>

    <div class="card mb-3">
        <div class="card-body">
            <h4>Total de usuarios registrados:</h4>
            <h2>{{ total }}</h2>
        </div>
    </div>

    <div class="card mb-3">
        <div class="card-body">
            <h4>Último usuario agregado:</h4>
            {% if ultimo %}
                <p><strong>ID:</strong> {{ ultimo[0] }}</p>
                <p><strong>Nombre:</strong> {{ ultimo[1] }}</p>
                <p><strong>Email:</strong> {{ ultimo[2] }}</p>
            {% else %}
                <p>No hay usuarios registrados.</p>
            {% endif %}
        </div>
    </div>

    <div class="mb-3">
        <p><strong>Fecha actual:</strong> {{ fecha }}</p>
    </div>

    <a href="/" class="btn btn-primary">Volver al CRUD</a>

</body>
</html>
